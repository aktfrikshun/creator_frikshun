<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Creator OS Sign-in</title>
    <style>
      :root{--ink:#171514;--muted:#756e69;--paper:#f5f1ea;--accent:#9e2f3d;--night:#211c1d;--line:#ddd6cc}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;color:var(--ink);background:radial-gradient(circle at 85% 0%,rgba(158,47,61,.1),transparent 28rem),var(--paper);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(520px,100%);padding:42px;border:1px solid var(--line);border-radius:22px;background:#fffdf9;box-shadow:0 18px 50px rgba(46,35,31,.09)}.mark{width:46px;height:46px;display:grid;place-items:center;border-radius:50%;color:white;background:var(--night);font:24px Georgia,serif}h1{margin:24px 0 10px;font:500 38px/1.08 Georgia,serif}p{color:var(--muted);line-height:1.65}.error{padding:14px 16px;border-radius:12px;color:#842c38;background:#fff0f2}a{color:var(--accent)}</style>
  </head>
  <body><main class="card"><div class="mark">F</div><h1>Creator OS sign-in</h1><p class="error">{{ error }}</p><p><a href="{{ url_for('creator.privacy') }}">Privacy</a> · <a href="{{ url_for('creator.terms') }}">Terms</a></p></main></body>
</html>
